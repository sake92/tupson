name: Release

on:
  push:
    tags: "*"

env:
  DEDER_PGP_PASSPHRASE: ${{ secrets.PGP_PASSPHRASE }}
  DEDER_PGP_SECRET: ${{ secrets.PGP_SECRET }}
  DEDER_SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
  DEDER_SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}

jobs:
  tests:
    uses: ./.github/workflows/ci.yml
  publish:
    needs: tests
    if: github.repository == 'sake92/squery'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: coursier/cache-action@v7
        with:
          extraFiles: deder.pkl
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main
      - name: Install deder
        run: brew install sake92/tap/deder
      - name: Publish to Maven Central
        run: deder exec -t publish
