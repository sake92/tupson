
name: CI

on:
  push:
    branches: main
  pull_request:
  workflow_call:  # allow this workflow to be called from other workflows (release.yml)

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    env:
      CONFIG_FORCE_envvar_port: 1234
      JAVA_TOOL_OPTIONS: -Dconfig.override_with_env_vars=true
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: coursier/cache-action@v7
        with:
          extraFiles: deder.pkl
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main
      - name: Install deder
        run: brew install sake92/tap/deder
      - name: Compile
        run: deder exec -t compile
      - name: Test
        run: |
          deder exec -m tupson-jvm-test-3.7.3 -t testInMemory
          deder exec -m tupson-config-test -t testInMemory
          deder exec -m tupson-js-test-3.7.3 -t test
          deder exec -m tupson-native-test-3.7.3 -t test
